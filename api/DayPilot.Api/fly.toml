# Fly.io app config for DayPilot API
# Create app: fly apps create daypilot-api  (or use existing)
# Set secrets: fly secrets set Google__ClientId=xxx Google__ClientSecret=xxx
# Deploy: fly deploy  (or push to main with FLY_API_TOKEN in GitHub secrets)

app = "daypilot-api"

[build]

[env]
  ASPNETCORE_URLS = "http://+:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
