# Manual release builds for TestFlight and Play internal testing.
# See docs/MOBILE_INTERNAL_RELEASE.md for secrets and store upload steps.

name: Flutter release

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: Build Android App Bundle (AAB)
        type: boolean
        default: true
      build_ios:
        description: Build iOS IPA (requires Apple signing secrets)
        type: boolean
        default: false

defaults:
  run:
    working-directory: daypilot_flutter

jobs:
  android-aab:
    if: inputs.build_android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Configure Android release signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF
      - name: Warn if Android signing secrets are missing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: |
          echo "::warning::ANDROID_KEYSTORE_* secrets not set — AAB will be signed with debug keys (not valid for Play production)."
      - name: Write production dart-defines
        env:
          FLUTTER_DART_DEFINES_JSON: ${{ secrets.FLUTTER_DART_DEFINES_JSON }}
        run: |
          if [ -z "$FLUTTER_DART_DEFINES_JSON" ]; then
            echo "::error::Set repository secret FLUTTER_DART_DEFINES_JSON (see docs/MOBILE_INTERNAL_RELEASE.md)."
            exit 1
          fi
          printf '%s' "$FLUTTER_DART_DEFINES_JSON" > dart-define.prod.json
      - run: flutter pub get
      - run: flutter build appbundle --release --dart-define-from-file=dart-define.prod.json
      - uses: actions/upload-artifact@v4
        with:
          name: daypilot-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  ios-ipa:
    if: inputs.build_ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Require Apple signing secrets
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          IOS_CERT: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          missing=0
          for v in "$ASC_KEY_ID" "$ASC_ISSUER_ID" "$ASC_KEY" "$IOS_CERT" "$IOS_PROFILE"; do
            [ -z "$v" ] && missing=1
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::iOS release requires App Store Connect API key + distribution cert + provisioning profile secrets. See docs/MOBILE_INTERNAL_RELEASE.md."
            exit 1
          fi
      - name: Install distribution certificate and profile
        env:
          IOS_CERT: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERT_PATH=$RUNNER_TEMP/distribution.p12
          PROFILE_PATH=$RUNNER_TEMP/daypilot.mobileprovision
          echo "$IOS_CERT" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROFILE" | base64 --decode > "$PROFILE_PATH"
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Write production dart-defines
        env:
          FLUTTER_DART_DEFINES_JSON: ${{ secrets.FLUTTER_DART_DEFINES_JSON }}
        run: printf '%s' "$FLUTTER_DART_DEFINES_JSON" > dart-define.prod.json
      - run: flutter pub get
      - run: pod install --repo-update
        working-directory: daypilot_flutter/ios
      - name: Build IPA
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          flutter build ipa --release --dart-define-from-file=dart-define.prod.json \
            --export-options-plist=ios/ExportOptions.plist
      - uses: actions/upload-artifact@v4
        with:
          name: daypilot-ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
